# Konfiguration fuer die Brooklyn Bike Thesis.
# Filterung erfolgt ueber das echte Brooklyn-Polygon (NYC Open Data),
# nicht mehr ueber eine Bounding Box.
study_area:
  name: brooklyn_full
  h3_resolution: 9   # ca. 175 m Kantenlaenge

gbfs:
  status_url: https://gbfs.citibikenyc.com/gbfs/en/station_status.json
  info_url:   https://gbfs.citibikenyc.com/gbfs/en/station_information.json

llm:
  model: qwen2.5:7b
  endpoint: http://localhost:11434

forecast:
  horizon_hours: 24
  hidden_dim: 32
  num_layers: 2

paths:
  db: db/prototype.sqlite
  data_dir: data
